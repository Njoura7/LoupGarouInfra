name: CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout LoupGarouInfra
        uses: actions/checkout@v4

      - name: Checkout LoupGarouAPI
        uses: actions/checkout@v4
        with:
          repository: BenAyedMehdi/LoupGarouAPI
          ref: develop
          path: LoupGarouAPI

      - name: Checkout LoupGarouReact
        uses: actions/checkout@v4
        with:
          repository: BenAyedMehdi/LoupGarouReact
          ref: develop
          path: LoupGarouReact

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }} \
            -f LoupGarouAPI/Dockerfile \
            LoupGarouAPI
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }}
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/api:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/api:latest

      - name: Build and push React image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/react:${{ github.sha }} \
            -f LoupGarouReact/Dockerfile \
            LoupGarouReact
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/react:${{ github.sha }}
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/react:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/react:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/react:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/api api=${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }}
          kubectl set image deployment/react react=${{ secrets.ACR_LOGIN_SERVER }}/react:${{ github.sha }}
          kubectl rollout status deployment/api
          kubectl rollout status deployment/react